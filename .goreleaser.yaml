project_name: cobrak

env:
  - GO111MODULE=on

before:
  hooks:
    - go mod tidy

builds:
  - id: cobrak
    main: ./main.go
    binary: cobrak
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

release:
  draft: false
  prerelease: auto
  name_template: 'Release {{.Version}}'
  header: |
    ## cobrak {{.Version}}

    ### What's Changed

  footer: |
    ## Installation

    ### Manual Installation
    Download the appropriate binary for your platform from the assets below.

    **Linux / macOS:**
    ```bash
    tar -xzf cobrak_{{.Version}}_linux_amd64.tar.gz
    chmod +x cobrak
    mv cobrak /usr/local/bin/
    ```

    **Windows:**
    Extract the zip file and add `cobrak.exe` to your PATH.

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

